<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebAR Shipwreck Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: sans-serif; }

    #splash {
      position: fixed; inset: 0; z-index: 999;
      background: #050810;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px; color: #fff;
      transition: opacity 0.6s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }

    #splash h1 { font-size: 26px; font-weight: 700; color: #5ee7ff; }
    #splash p  { font-size: 14px; color: #8aa; text-align: center; max-width: 300px; line-height: 1.6; }

    #start-btn {
      padding: 14px 36px;
      background: #5ee7ff; color: #050810;
      border: none; border-radius: 10px;
      font-size: 16px; font-weight: 700; cursor: pointer;
    }

    #hint-bar {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(5,8,16,0.85);
      border: 1px solid #5ee7ff44; border-radius: 12px;
      padding: 10px 20px; color: #5ee7ff; font-size: 13px;
      transition: transform 0.35s ease;
      z-index: 100; pointer-events: none; white-space: nowrap;
    }
    #hint-bar.show { transform: translateX(-50%) translateY(0); }

    #marker-guide {
      position: fixed; top: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(5,8,16,0.7);
      border: 1px solid #ffffff22; border-radius: 10px;
      padding: 8px 16px; color: #aac; font-size: 12px;
      text-align: center; z-index: 100; pointer-events: none; display: none;
    }
    #marker-guide.show { display: block; }

    #ar-container { position: fixed; inset: 0; z-index: 1; }
  </style>
</head>
<body>

<div id="splash">
  <h1>⚓ WebAR Viewer</h1>
  <p>Point your camera at one of the printed markers to see a 3D model appear in the real world.</p>
  <button id="start-btn" onclick="startAR()">Open Camera</button>
  <p style="font-size:12px;color:#556">Requires camera permission</p>
</div>

<div id="hint-bar">🎯 Marker detected — hold camera steady</div>
<div id="marker-guide">Scan a marker to start</div>
<div id="ar-container"></div>

<script>
  const hintBar     = document.getElementById("hint-bar");
  const markerGuide = document.getElementById("marker-guide");
  const arContainer = document.getElementById("ar-container");
  let hintTimeout;

  function startAR() {
    // Hide splash
    document.getElementById("splash").classList.add("hide");
    markerGuide.classList.add("show");

    // Build A-Frame scene HTML string and inject into DOM.
    // This is the iOS Safari fix — creating the scene AFTER
    // a user gesture (button tap) so the browser grants camera access.
    arContainer.innerHTML = `
      <a-scene
        mindar-image="
          imageTargetSrc: /mind/targets.mind;
          autoStart: true;
          uiScanning: no;
          filterMinCF: 0.001;
          filterBeta: 0.01;
        "
        color-space="sRGB"
        renderer="colorManagement: true; physicallyCorrectLights: true"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
      >
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-assets>
          <a-asset-item id="model-poso"       src="/models/OBJ_Mesh_Poso.glb"></a-asset-item>
          <a-asset-item id="model-tabularasa" src="/models/OBJ_Mesh_Tabularasa.glb"></a-asset-item>
        </a-assets>

        <a-light type="ambient"     color="#ffffff" intensity="0.6"></a-light>
        <a-light type="directional" color="#ffffff" intensity="1.2" position="1 2 1"></a-light>
        <a-light type="point"       color="#5ee7ff" intensity="0.4" position="-1 1 0"></a-light>

        <!-- marker-1-shipwreck.png → OBJ_Mesh_Poso -->
        <a-entity mindar-image-target="targetIndex: 0" id="target-0">
          <a-entity
            gltf-model="#model-poso"
            position="0 0.05 0"
            rotation="-90 0 0"
            scale="0.08 0.08 0.08"
            animation="property: rotation; from: -90 0 0; to: -90 360 0; loop: true; dur: 8000; easing: linear"
          ></a-entity>
        </a-entity>

        <!-- marker-2-submarine.png → OBJ_Mesh_Tabularasa -->
        <a-entity mindar-image-target="targetIndex: 1" id="target-1">
          <a-entity
            gltf-model="#model-tabularasa"
            position="0 0.05 0"
            rotation="-90 0 0"
            scale="0.08 0.08 0.08"
            animation="property: rotation; from: -90 0 0; to: -90 360 0; loop: true; dur: 8000; easing: linear"
          ></a-entity>
        </a-entity>

      </a-scene>
    `;

    // Wait for scene to be in DOM then attach target events
    setTimeout(() => {
      for (let i = 0; i < 2; i++) {
        const el = document.getElementById("target-" + i);
        if (!el) continue;
        el.addEventListener("targetFound", () => {
          clearTimeout(hintTimeout);
          hintBar.classList.add("show");
          markerGuide.classList.remove("show");
        });
        el.addEventListener("targetLost", () => {
          hintTimeout = setTimeout(() => {
            hintBar.classList.remove("show");
            markerGuide.classList.add("show");
          }, 1200);
        });
      }
    }, 500);
  }
</script>
</body>
</html>
